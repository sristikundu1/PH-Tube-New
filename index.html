<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=ADLaM+Display&family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quicksand:wght@300..700&family=Raleway:ital,wght@0,100..900;1,100..900&family=Sora:wght@100..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>PH Tube</title>

    <!-- daysi Ui link  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @theme {
        --color-primary: rgba(255, 31, 61, 1);
        --font-inter: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="font-inter">
    <header class="w-11/12 mx-auto py-7 border-b-2 border-[rgba(23,23,23,0.2)]">
      <div class="flex justify-between items-center">
        <div>
          <img class="w-32 h-auto" src="./Logo.png" alt="logo" />
        </div>
        <div>
          <button class="btn btn-sm bg-[rgba(37,37,37,0.2)]">
            Sort by view
          </button>
        </div>
        <div>
          <button class="btn btn-sm bg-[var(--color-primary)] text-white">
            Blog
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="py-7">
        <div
          id="categories-container"
          class="flex items-center justify-center gap-6"
        >
          <div>
            <button
              class="btn btn-sm bg-[rgba(37,37,37,0.15)] text-[rgba(37,37,37,0.7)]"
            >
              All
            </button>
          </div>
        </div>
      </section>

      <section class="w-11/12 mx-auto py-7">
        <div id="card-container" class="grid grid-cols-4 gap-4"></div>
      </section>
    </main>

    <!-- js file link  -->
    <script src="./scripts/index.js"></script>
  </body>
</html>
